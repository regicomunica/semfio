<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Comunica SEM FIO | Agregador de Notícias por Estado</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">
  <header class="bg-slate-900 text-white">
    <div class="max-w-7xl mx-auto px-4 py-6">
      <h1 class="text-3xl font-black tracking-tight">Comunica SEM FIO</h1>
      <p class="text-slate-300 mt-2">Curadoria em tempo real de notícias dos 26 estados + DF, com atualização diária contínua.</p>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 py-6 space-y-8">
    <section class="bg-white border border-slate-200 rounded-xl p-4 shadow-sm">
      <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
        <div>
          <h2 class="text-lg font-bold">Painel de atualização</h2>
          <p id="lastUpdate" class="text-sm text-slate-600">Última atualização: ainda não carregado.</p>
        </div>
        <div class="flex items-center gap-2">
          <label for="autoRefresh" class="text-sm font-medium">Atualização automática (15 min)</label>
          <input id="autoRefresh" type="checkbox" class="rounded border-slate-300" checked />
          <button id="refreshBtn" class="px-4 py-2 bg-slate-900 text-white rounded-lg hover:bg-slate-700">Atualizar agora</button>
        </div>
      </div>
      <p id="status" class="mt-3 text-sm text-slate-600">Iniciando coleta...</p>
    </section>

    <section class="bg-white border border-slate-200 rounded-xl p-4 shadow-sm">
      <h2 class="text-xl font-extrabold mb-4">Destaques nacionais agregados</h2>
      <div id="headlineFeed" class="space-y-3"></div>
    </section>

    <section class="bg-white border border-slate-200 rounded-xl p-4 shadow-sm">
      <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-3 mb-4">
        <h2 class="text-xl font-extrabold">Feed por estado</h2>
        <input id="stateFilter" type="text" placeholder="Filtrar estado..." class="w-full md:w-72 rounded-lg border-slate-300" />
      </div>
      <div id="statesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
    </section>
  </main>

  <script>
    const BRAZILIAN_STATES = [
      { uf: 'AC', name: 'Acre' }, { uf: 'AL', name: 'Alagoas' }, { uf: 'AP', name: 'Amapá' },
      { uf: 'AM', name: 'Amazonas' }, { uf: 'BA', name: 'Bahia' }, { uf: 'CE', name: 'Ceará' },
      { uf: 'DF', name: 'Distrito Federal' }, { uf: 'ES', name: 'Espírito Santo' }, { uf: 'GO', name: 'Goiás' },
      { uf: 'MA', name: 'Maranhão' }, { uf: 'MT', name: 'Mato Grosso' }, { uf: 'MS', name: 'Mato Grosso do Sul' },
      { uf: 'MG', name: 'Minas Gerais' }, { uf: 'PA', name: 'Pará' }, { uf: 'PB', name: 'Paraíba' },
      { uf: 'PR', name: 'Paraná' }, { uf: 'PE', name: 'Pernambuco' }, { uf: 'PI', name: 'Piauí' },
      { uf: 'RJ', name: 'Rio de Janeiro' }, { uf: 'RN', name: 'Rio Grande do Norte' }, { uf: 'RS', name: 'Rio Grande do Sul' },
      { uf: 'RO', name: 'Rondônia' }, { uf: 'RR', name: 'Roraima' }, { uf: 'SC', name: 'Santa Catarina' },
      { uf: 'SP', name: 'São Paulo' }, { uf: 'SE', name: 'Sergipe' }, { uf: 'TO', name: 'Tocantins' },
    ];

    const REFRESH_MS = 15 * 60 * 1000;
    let refreshTimer = null;
    let stateNewsCache = [];

    const statusEl = document.getElementById('status');
    const lastUpdateEl = document.getElementById('lastUpdate');
    const statesGrid = document.getElementById('statesGrid');
    const headlineFeed = document.getElementById('headlineFeed');
    const stateFilter = document.getElementById('stateFilter');

    function formatDate(dateStr) {
      if (!dateStr) return 'Sem data';
      const dt = new Date(dateStr);
      if (Number.isNaN(dt.getTime())) return 'Sem data';
      return dt.toLocaleString('pt-BR', { dateStyle: 'short', timeStyle: 'short' });
    }

    function escapeHtml(text) {
      return text
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function buildRssUrl(stateName, uf) {
      const query = encodeURIComponent(`notícias ${stateName} ${uf} when:1d`);
      return `https://news.google.com/rss/search?q=${query}&hl=pt-BR&gl=BR&ceid=BR:pt-419`;
    }

    async function fetchStateNews(state) {
      const rssUrl = buildRssUrl(state.name, state.uf);
      const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(rssUrl)}`;

      const response = await fetch(proxyUrl, { cache: 'no-store' });
      if (!response.ok) {
        throw new Error(`HTTP ${response.status}`);
      }

      const xmlText = await response.text();
      const xml = new DOMParser().parseFromString(xmlText, 'text/xml');
      const parserError = xml.querySelector('parsererror');
      if (parserError) {
        throw new Error('Falha ao interpretar RSS');
      }

      const items = [...xml.querySelectorAll('item')].slice(0, 3).map((item) => ({
        title: item.querySelector('title')?.textContent?.trim() || 'Sem título',
        link: item.querySelector('link')?.textContent?.trim() || '#',
        pubDate: item.querySelector('pubDate')?.textContent?.trim() || '',
        source: item.querySelector('source')?.textContent?.trim() || 'Fonte não informada',
      }));

      return { ...state, items };
    }

    function renderHeadlines(data) {
      const merged = data
        .flatMap((stateData) => stateData.items.map((item) => ({ ...item, state: stateData.name, uf: stateData.uf })))
        .sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate))
        .slice(0, 10);

      if (!merged.length) {
        headlineFeed.innerHTML = '<p class="text-sm text-slate-500">Sem destaques no momento.</p>';
        return;
      }

      headlineFeed.innerHTML = merged.map((item) => `
        <article class="border border-slate-200 rounded-lg p-3 hover:bg-slate-50">
          <div class="text-xs text-slate-500 mb-1">${escapeHtml(item.state)} (${escapeHtml(item.uf)}) • ${escapeHtml(item.source)} • ${escapeHtml(formatDate(item.pubDate))}</div>
          <a href="${item.link}" target="_blank" rel="noopener noreferrer" class="font-semibold hover:underline">${escapeHtml(item.title)}</a>
        </article>
      `).join('');
    }

    function renderStates(data) {
      const filter = stateFilter.value.trim().toLowerCase();
      const filtered = data.filter((stateData) => {
        const key = `${stateData.name} ${stateData.uf}`.toLowerCase();
        return key.includes(filter);
      });

      if (!filtered.length) {
        statesGrid.innerHTML = '<p class="text-sm text-slate-500">Nenhum estado encontrado para o filtro informado.</p>';
        return;
      }

      statesGrid.innerHTML = filtered.map((stateData) => {
        const list = stateData.items.length
          ? stateData.items.map((item) => `
            <li class="text-sm">
              <a href="${item.link}" target="_blank" rel="noopener noreferrer" class="hover:underline">${escapeHtml(item.title)}</a>
              <div class="text-xs text-slate-500">${escapeHtml(item.source)} • ${escapeHtml(formatDate(item.pubDate))}</div>
            </li>
          `).join('')
          : '<li class="text-sm text-slate-500">Sem notícias recentes para este estado.</li>';

        return `
          <article class="border border-slate-200 rounded-lg p-4 bg-slate-50">
            <h3 class="text-lg font-bold">${escapeHtml(stateData.name)} <span class="text-slate-500">(${escapeHtml(stateData.uf)})</span></h3>
            <ul class="mt-3 space-y-3">${list}</ul>
          </article>
        `;
      }).join('');
    }

    async function loadNews() {
      statusEl.textContent = 'Coletando notícias por estado...';
      const tasks = BRAZILIAN_STATES.map((state) => fetchStateNews(state));
      const results = await Promise.allSettled(tasks);

      const success = results.filter((r) => r.status === 'fulfilled').map((r) => r.value);
      const failed = results.filter((r) => r.status === 'rejected').length;

      stateNewsCache = success;
      renderHeadlines(stateNewsCache);
      renderStates(stateNewsCache);

      const updatedAt = new Date();
      lastUpdateEl.textContent = `Última atualização: ${updatedAt.toLocaleString('pt-BR', { dateStyle: 'full', timeStyle: 'medium' })}`;
      statusEl.textContent = failed
        ? `Atualizado com ${success.length} estados e ${failed} falhas de coleta (fonte indisponível ou bloqueio temporário).`
        : `Atualizado com sucesso para ${success.length} estados.`;
    }

    function restartAutoRefresh() {
      if (refreshTimer) clearInterval(refreshTimer);
      const enabled = document.getElementById('autoRefresh').checked;
      if (enabled) {
        refreshTimer = setInterval(loadNews, REFRESH_MS);
      }
    }

    document.getElementById('refreshBtn').addEventListener('click', loadNews);
    document.getElementById('autoRefresh').addEventListener('change', restartAutoRefresh);
    stateFilter.addEventListener('input', () => renderStates(stateNewsCache));

    loadNews();
    restartAutoRefresh();
  </script>
</body>
</html>
